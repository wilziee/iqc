<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TikTok Downloader</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Landing Page -->
    <section class="landing-page" id="landingPage">
        <div class="animated-bg"></div>
        <div class="container">
            <div class="welcome-card">
                <div class="logo-container animate-zoomIn">
                    <i class="fab fa-tiktok"></i>
                </div>
                <div class="welcome-text">
                    <h1>TikTok Downloader</h1>
                    <p>Selamat datang di TikTok Downloader</p>
                </div>
                <button class="continue-btn" id="continueBtn">
                    <span>Lanjutkan</span>
                    <i class="fas fa-arrow-right"></i>
                </button>
            </div>
        </div>
    </section>

    <!-- Download Page -->
    <section class="download-page" id="downloadPage">
        <div class="container">
            <div class="main-card">
                <div class="card-header">
                    <div class="logo-section">
                        <div class="logo-small">
                            <i class="fab fa-tiktok"></i>
                        </div>
                        <div class="logo-text">
                            <h2>TikTok Downloader</h2>
                            <p>Download video & foto TikTok</p>
                        </div>
                    </div>
                </div>
                
                <div class="version-badge">v1.0</div>
                
                <div class="input-section">
                    <div class="url-input-container">
                        <input type="text" class="url-input" id="urlInput" placeholder="Tempel URL TikTok di sini...">
                        <button class="paste-btn" id="pasteBtn" title="Tempel dari clipboard">
                            <i class="fas fa-paste"></i>
                        </button>
                    </div>
                    <button class="download-btn" id="downloadBtn">
                        Download
                    </button>
                </div>
                
                <div class="loading" id="loading">
                    <div class="spinner"></div>
                    <p>Memproses...</p>
                </div>
                
                <div class="error-message" id="errorMessage">
                    <i class="fas fa-exclamation-circle"></i>
                    <p id="errorText">URL tidak valid. Silakan coba lagi.</p>
                </div>
                
                <!-- Video Result -->
                <div class="result-section" id="videoResult">
                    <div class="video-result">
                        <div class="thumbnail-container">
                            <img id="videoThumbnail" class="thumbnail" src="" alt="Video Thumbnail">
                        </div>
                        <div class="video-info">
                            <div class="video-details">
                                <h3 id="videoTitle">Judul Video</h3>
                                <div class="info-item">
                                    <i class="fas fa-user"></i>
                                    <span id="videoAuthor">Pembuat Konten</span>
                                </div>
                                <div class="info-item">
                                    <i class="fas fa-clock"></i>
                                    <span id="videoDuration">0:00</span>
                                </div>
                                <div class="info-item">
                                    <i class="fas fa-eye"></i>
                                    <span id="videoViews">0 views</span>
                                </div>
                                <div class="info-item">
                                    <i class="fas fa-heart"></i>
                                    <span id="videoLikes">0 likes</span>
                                </div>
                            </div>
                            <div class="video-description" id="videoDescription">
                                Deskripsi video akan muncul di sini
                            </div>
                            <div class="download-options">
                                <button class="option-btn" id="downloadVideoBtn">
                                    Download Video
                                </button>
                                <button class="option-btn" id="downloadMusicBtn">
                                    Download Musik
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
                
                <!-- Photo Result - VERTIKAL (TANPA DATA KREATOR) -->
                <div class="result-section" id="photoResult">
                    <div class="photo-list" id="photoList">
                        <!-- Foto akan ditampilkan di sini secara vertikal -->
                    </div>
                    <div class="download-options" style="margin-top: 20px;">
                        <button class="option-btn" id="downloadPhotoBtn">
                            Download Semua Foto
                        </button>
                    </div>
                </div>
            </div>
            
            <div class="footer">
                <p>©2026 Wilxd. All right reserved</p>
            </div>
        </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
