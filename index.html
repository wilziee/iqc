<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IQC STUDIO - Mobile Build</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="gradient-bg">
        <div class="gradient-pink"></div>
        <div class="gradient-blue"></div>
    </div>
    
    <div class="container-wrapper">
        <div class="mobile-container">
            <div class="mobile-header">
                <div class="header-left">
                    <div class="studio-title">IQC STUDIO</div>
                    <div class="build-version">MOBILE BUILD v3.0</div>
                    <div class="divider-line"></div>
                </div>
                
                <div class="ready-badge">
                    <div class="ready-dot"></div>
                    <div class="ready-text">READY</div>
                </div>
            </div>
            
            <div class="input-section">
                <!-- Baris 1: Input Pesan (full width) -->
                <div class="input-group">
                    <div class="input-label">
                        PESAN CHAT
                    </div>
                    <input type="text" id="text" class="message-input" placeholder="Ketik pesan disini...">
                </div>
                
                <!-- Baris 2: Select Style -->
                <div class="input-group">
                    <div class="input-label">
                        STYLE
                    </div>
                    <div class="custom-select-wrapper">
                        <select class="custom-select" id="styleSelect">
                            <option value="style1">Style 1</option>
                            <option value="style2">Style 2</option>
                        </select>
                    </div>
                </div>

                <!-- Baris 3: Select Background -->
                <div class="input-group" id="bgGroup" style="display:none;">
                    <div class="input-label">
                        BACKGROUND
                    </div>
                    <div class="custom-select-wrapper">
                        <select class="custom-select" id="bgSelect">
                            <option value="pink">Pink</option>
                            <option value="light">Light</option>
                            <option value="dark">Dark</option>
                        </select>
                    </div>
                </div>

                <!-- Baris 4: Input Waktu (full width) -->
                <div class="input-group">
                    <div class="input-label">
                        WAKTU
                    </div>
                    <input type="text" id="time" class="message-input" placeholder="22.54">
                </div>
            </div>
            
            <div class="error-message" id="errorMessage">
                <i class="fas fa-exclamation-circle"></i>
                <span id="errorText">Terjadi kesalahan. Periksa input Anda dan coba lagi.</span>
            </div>
            
            <button class="generate-btn" id="generateBtn">
                <i class="fas fa-bolt"></i>
                GENERATE IMAGE
            </button>
            
            <div class="result-section" id="resultSection">
                <div class="image-container">
                    <img id="generatedImage" class="generated-image" src="" alt="Generated Image">
                </div>
                
                <div class="action-buttons">
                    <button class="action-btn download-btn" id="downloadBtn">
                        <i class="fas fa-download"></i>
                        Download
                    </button>
                    <button class="action-btn new-btn" id="newBtn">
                        <i class="fas fa-redo"></i>
                        Buat Baru
                    </button>
                </div>
            </div>
            
            <div class="mobile-footer">
                <a href="https://whatsapp.com/channel/0029VbD5XgjEVccHF8XVcr3q" target="_blank" class="whatsapp-btn">
                    <i class="fab fa-whatsapp"></i>
                     JOIN WA CHANNEL 
                </a>
                
                <div class="developer-credit">
                    DEV BY <span class="dev-name">LUTFIZX</span>
                </div>
            </div>
        </div>
    </div>
    
    <div class="loading-overlay" id="loadingOverlay">
        <div class="spinner"></div>
        <p class="loading-text">Generating Image...</p>
    </div>
    
    <div class="notification" id="notification">
        <div class="notification-icon">
            <i class="fas fa-check-circle"></i>
        </div>
        <div class="notification-content">
            <h3>Generate Selesai!</h3>
            <p>Gambar berhasil dibuat dan siap diunduh</p>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
