<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IQC Generator - Universe Theme</title>
  <!-- Library untuk fitur Download Gambar -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  
  <style>
    :root {
      --bg-dark: #05010a; /* Hitam pekat agak ungu */
      --panel-bg: rgba(25, 10, 45, 0.6); /* Transparan ungu gelap */
      --accent: #a277ff; /* Ungu neon */
      --accent-glow: 0 0 15px rgba(162, 119, 255, 0.5);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    body {
      background-color: var(--bg-dark);
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
      gap: 20px;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* --- CANVAS UNTUK ANIMASI PARTIKEL --- */
    #universe {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: -1; /* Supaya ada di paling belakang */
    }

    /* --- FORM INPUT AREA (GLASSMORPHISM) --- */
    .control-panel {
      background: var(--panel-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(162, 119, 255, 0.2);
      box-shadow: var(--accent-glow);
      padding: 25px;
      border-radius: 16px;
      width: 100%;
      max-width: 350px;
      display: flex;
      flex-direction: column;
      gap: 15px;
      position: relative;
      z-index: 1;
    }

    .control-panel h3 {
      font-size: 20px;
      border-bottom: 1px solid rgba(162, 119, 255, 0.3);
      padding-bottom: 10px;
      margin-bottom: 5px;
      text-align: center;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    .input-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .input-group label {
      font-size: 13px;
      color: #d1bdfc;
      font-weight: 500;
    }

    .input-group input {
      padding: 12px;
      border-radius: 8px;
      border: 1px solid rgba(162, 119, 255, 0.3);
      background-color: rgba(0, 0, 0, 0.5);
      color: #fff;
      font-size: 14px;
      transition: all 0.3s;
    }
    
    .input-group input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 10px rgba(162, 119, 255, 0.4);
    }

    /* --- BUTTONS --- */
    .btn {
      width: 100%;
      padding: 15px;
      border-radius: 10px;
      border: none;
      color: white;
      font-weight: bold;
      font-size: 15px;
      cursor: pointer;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
      transition: all 0.2s;
      margin-top: 10px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .btn:active {
      transform: scale(0.97);
    }
    
    .btn-generate { 
      background: linear-gradient(135deg, #5b247a 0%, #1bcedf 100%);
      box-shadow: 0 4px 15px rgba(91, 36, 122, 0.5);
    }
    .btn-generate:hover {
      box-shadow: 0 6px 20px rgba(27, 206, 223, 0.6);
    }
    
    .btn-download { 
      background: linear-gradient(135deg, #7b2cbf 0%, #3c096c 100%); 
      box-shadow: 0 4px 15px rgba(123, 44, 191, 0.5);
    }
    .btn-baru { 
      background-color: rgba(25, 10, 45, 0.8); 
      border: 1px solid var(--accent);
      color: var(--accent);
    }

    /* --- RESULT AREA --- */
    #resultArea {
      display: none; 
      width: 100%;
      max-width: 350px;
      flex-direction: column;
      gap: 12px;
      align-items: center;
      position: relative;
      z-index: 1;
    }

    /* --- AREA MENTAHAN --- */
    .preview-container {
      width: 320px;
      height: 568px;
      background-image: url('mentahan.jpg');
      background-size: cover;
      background-position: center;
      position: relative;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 10px 40px rgba(162, 119, 255, 0.2);
    }

    .status-bar {
      position: absolute; top: 0; left: 0; width: 100%; padding: 12px 18px;
      display: flex; justify-content: space-between; align-items: center;
      font-size: 13px; font-weight: 600; z-index: 10;
    }

    .status-left { display: flex; gap: 8px; }
    .status-right { display: flex; align-items: center; gap: 6px; }

    .battery-icon {
      width: 24px; height: 12px; border: 1px solid rgba(255,255,255,0.8);
      border-radius: 4px; position: relative; padding: 1px;
    }
    .battery-icon::after {
      content: ''; position: absolute; right: -3px; top: 3px;
      width: 2px; height: 4px; background: rgba(255,255,255,0.8); border-radius: 1px;
    }
    .battery-level {
      height: 100%; width: 18%; background-color: #ff3b30; border-radius: 2px;
    }

    .chat-overlay {
      position: absolute; top: 250px; left: 20px; max-width: 230px;
      font-size: 15px; line-height: 1.4; color: #e4e4e4; word-wrap: break-word; z-index: 10;
    }
    
    .time-cover {
      position: absolute; top: 275px; right: 40px; background-color: #1e1e1e;
      color: rgba(255,255,255,0.5); font-size: 11px; padding: 0 4px;
    }
  </style>
</head>
<body>

  <!-- BACKGROUND PARTIKEL -->
  <canvas id="universe"></canvas>

  <!-- AREA FORM INPUT -->
  <div class="control-panel" id="inputArea">
    <h3> IQC Generator </h3>
    <div class="input-group">
      <label>Isi Chat</label>
      <input type="text" id="inpText" placeholder="Masukkan teks chat..." value="  ">
    </div>
    <div class="input-group">
      <label>Provider</label>
      <input type="text" id="inpSim" placeholder="  " value="  ">
    </div>
    <div class="input-group">
      <label>Jam</label>
      <input type="text" id="inpTime" placeholder=" " value=" ">
    </div>
    <div class="input-group">
      <label>Baterai (%)</label>
      <input type="number" id="inpBattery" placeholder="" value=" " min="1" max="100">
    </div>

    <!-- Tombol Generate -->
    <button class="btn btn-generate" onclick="generateImage()">
      <span>🚀</span> GENERATE
    </button>
  </div>

  <!-- AREA HASIL -->
  <div id="resultArea">
    
    <!-- Gambar yang akan dirender -->
    <div class="preview-container" id="captureArea">
      <div class="status-bar">
        <div class="status-left">
          <span id="outSim">‎ </span>
          <span id="outTimeTop">‎ </span>
        </div>
        <div class="status-right">
          <svg width="16" height="12" viewBox="0 0 16 12"><path d="M1 9h2v3H1zM5 6h2v6H5zM9 3h2v9H9zM13 0h2v12h-2z" fill="#fff"/></svg>
          <svg width="16" height="12" viewBox="0 0 16 12"><path d="M8 12L0 4C2 2 5 1 8 1s6 1 8 3l-8 8z" fill="#fff"/></svg>
          <div class="battery-icon">
            <div class="battery-level" id="outBatteryLevel"></div>
          </div>
        </div>
      </div>
      <div class="chat-overlay" id="outText">asu</div>
      <div class="time-cover" id="outTimeBubble">‎ </div>
    </div>

    <!-- Tombol Download & Buat Baru -->
    <button class="btn btn-download" onclick="downloadResult()">
      <span>⬇</span> SIMPAN GAMBAR
    </button>
    <button class="btn btn-baru" onclick="buatBaru()">
      <span>↻</span> KEMBALI
    </button>
  </div>

  <!-- SCRIPT LOGIKA & ANIMASI -->
  <script>
    /* =========================================
       ANIMASI PARTIKEL (UNIVERSE EFFECT)
       ========================================= */
    const canvas = document.getElementById("universe");
    const ctx = canvas.getContext("2d");
    
    let w = canvas.width = window.innerWidth;
    let h = canvas.height = window.innerHeight;
    let particles = [];
    
    // Buat 100 partikel (bintang)
    for (let i = 0; i < 100; i++) {
        particles.push({
            x: Math.random() * w,
            y: Math.random() * h,
            r: Math.random() * 1.5 + 0.5, // Ukuran bintang
            d: Math.random() * 0.5 + 0.2  // Kecepatan melayang
        });
    }
    
    function drawParticles() {
        ctx.clearRect(0, 0, w, h);
        ctx.fillStyle = "rgba(162, 119, 255, 0.8)"; // Warna ungu bintang
        ctx.beginPath();
        for (let i = 0; i < particles.length; i++) {
            let p = particles[i];
            ctx.moveTo(p.x, p.y);
            ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2, true);
        }
        ctx.fill();
        updateParticles();
    }
    
    function updateParticles() {
        for (let i = 0; i < particles.length; i++) {
            let p = particles[i];
            p.y -= p.d; // Bergerak ke atas
            
            // Kalau lewat batas atas, balik ke bawah
            if (p.y < -10) {
                p.y = h + 10;
                p.x = Math.random() * w;
            }
        }
    }
    
    // Looping animasi
    setInterval(drawParticles, 33);
    
    // Sesuaikan ukuran saat layar di-resize
    window.addEventListener('resize', () => {
        w = canvas.width = window.innerWidth;
        h = canvas.height = window.innerHeight;
    });

    /* =========================================
       LOGIKA APLIKASI IQC
       ========================================= */
    function generateImage() {
      const textVal = document.getElementById('inpText').value;
      const simVal = document.getElementById('inpSim').value;
      const timeVal = document.getElementById('inpTime').value;
      const batVal = parseInt(document.getElementById('inpBattery').value) || 0;

      document.getElementById('outText').innerText = textVal;
      document.getElementById('outSim').innerText = simVal;
      document.getElementById('outTimeTop').innerText = timeVal;
      document.getElementById('outTimeBubble').innerText = timeVal;

      const batLevel = document.getElementById('outBatteryLevel');
      batLevel.style.width = batVal + '%';
      if(batVal <= 20) {
        batLevel.style.backgroundColor = '#ff3b30'; 
      } else {
        batLevel.style.backgroundColor = '#fff';
      }

      document.getElementById('inputArea').style.display = 'none';
      document.getElementById('resultArea').style.display = 'flex';
    }

    function downloadResult() {
      const captureArea = document.getElementById('captureArea');
      html2canvas(captureArea, {
        useCORS: true, 
        scale: 2 
      }).then(canvas => {
        let link = document.createElement('a');
        link.download = 'IQC_Universe_Result.png';
        link.href = canvas.toDataURL('image/png');
        link.click();
      });
    }

    function buatBaru() {
      document.getElementById('inputArea').style.display = 'flex';
      document.getElementById('resultArea').style.display = 'none';
    }
  </script>

</body>
</html>
