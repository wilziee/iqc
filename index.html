<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>XAERISOFT Chat Studio</title>
    <!-- Modern Font: Inter for readability, Space Grotesk for Cyber feel -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Dynamic Universe Background -->
    <div class="universe-bg">
        <div class="aurora aurora-1"></div>
        <div class="aurora aurora-2"></div>
        <div class="stars"></div>
        <div class="meteors">
            <div class="meteor"></div>
            <div class="meteor"></div>
            <div class="meteor"></div>
            <div class="meteor"></div>
        </div>
        <div class="particles"></div>
    </div>

    <!-- Main Workspace -->
    <div class="container-wrapper">
        <main class="glass-card">
            <header class="studio-header">
                <div class="logo-group">
                    <div class="pulse-ring"></div>
                    <i class="fas fa-microchip cyber-icon"></i>
                    <h1 class="brand-name">XAERISOFT <span>STUDIO</span></h1>
                </div>
                <div class="status-badge">
                    <span class="status-dot"></span> v3.5
                </div>
            </header>

            <div class="input-grid">
                <!-- FITUR BARU: Pemilihan Platform -->
                <div class="input-wrapper">
                    <label><i class="fas fa-mobile-alt"></i> Platform Target</label>
                    <select id="platformSelect" class="neon-input" style="cursor: pointer;">
                        <option value="tiktok">Fake Chat TikTok</option>
                        <option value="whatsapp">Fake Chat WhatsApp (IQC WA)</option>
                    </select>
                </div>

                <!-- FITUR BARU: Pemilihan Tema WA -->
                <div class="input-wrapper" id="themeWrapper" style="display: none;">
                    <label><i class="fas fa-palette"></i> Tema WhatsApp</label>
                    <select id="themeSelect" class="neon-input" style="cursor: pointer;">
                        <option value="dark">Dark Style</option>
                        <option value="light">Light Style</option>
                        <option value="pink">Pink Style</option>
                    </select>
                </div>

                <div class="input-wrapper" id="usernameWrapper">
                    <label><i class="fas fa-user-astronaut"></i> ID / Username</label>
                    <input type="text" id="username" class="neon-input" placeholder="Masukkan identitas..." autocomplete="off">
                </div>
                
                <div class="input-wrapper">
                    <label><i class="fas fa-comment-dots"></i> Transmisi Pesan</label>
                    <textarea id="chatText" class="neon-input" placeholder="Ketik transmisi pesan di sini..."></textarea>
                </div>

                <div class="input-wrapper" id="avatarWrapper">
                    <label><i class="fas fa-user-circle"></i> Visual Avatar</label>
                    <div class="drop-zone" id="dropZone">
                        <input type="file" id="avatarFile" accept="image/*" hidden>
                        <img class="avatar-preview" id="avatarThumb" src="" alt="Avatar">
                        <div class="dz-content" id="dzContent">
                            <i class="fas fa-cloud-upload-alt upload-icon"></i>
                            <span class="dz-text">Inisialisasi Avatar</span>
                            <span class="dz-subtext">Drop image or click</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Error Banner -->
            <div class="cyber-alert" id="errorMessage">
                <i class="fas fa-exclamation-triangle"></i>
                <span id="errorText">Sistem mendeteksi anomali.</span>
            </div>

            <!-- Action Area -->
            <button class="btn-generate" id="generateBtn">
                <span class="btn-text">INITIALIZE RENDER</span>
                <i class="fas fa-bolt"></i>
            </button>

            <!-- Result Area -->
            <div class="result-panel" id="resultSection">
                <div class="canvas-wrapper">
                    <canvas id="canvasPreview"></canvas>
                </div>
                <div class="action-grid">
                    <button class="btn-cyber btn-download" id="downloadBtn">
                        <i class="fas fa-download"></i> Simpan
                    </button>
                    <button class="btn-cyber btn-reset" id="newBtn">
                        <i class="fas fa-sync-alt"></i> Reset
                    </button>
                </div>
            </div>
            
            <footer class="cyber-footer">
                <p>ENGINEERED BY <span>XAERISOFT</span></p>
            </footer>
        </main>
    </div>

    <!-- Loading Matrix -->
    <div class="loading-matrix" id="loadingOverlay">
        <div class="cyber-spinner"></div>
        <h2 class="loading-title">RENDERING PROTOCOL</h2>
        <p class="loading-sub" id="loadingSub">Menghitung kalkulasi piksel...</p>
    </div>

    <!-- Cyber Notification -->
    <div class="toast-notification" id="notification">
        <div class="toast-icon"><i class="fas fa-check-double"></i></div>
        <div class="toast-body">
            <h4>Render Sukses</h4>
            <p>Aset visual siap digunakan.</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
