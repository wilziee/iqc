<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lobby Generator // Cyber Edition</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Ambient Ambient & Particle Layer -->
<canvas id="cyberParticles"></canvas>
<div class="ambient-glow glow-cyan"></div>
<div class="ambient-glow glow-purple"></div>

<div class="container-wrapper">
    <main class="cyber-card">
        <!-- Top Tech Bar / Corner Deco -->
        <div class="card-deco-line"></div>
        
        <div class="card-header">
            <div class="header-main">
                <h1 class="cyber-brand"><i class="fas fa-satellite-dish pulse-icon"></i> TERMINAL_LOBBY</h1>
                <span class="cyber-sub-brand">CORE GENERATOR v2.0 // PREMIUM</span>
            </div>
            <div class="status-node">
                <span class="status-pulse"></span>
                <span class="status-label">SYS_ONLINE</span>
            </div>
        </div>

        <!-- Alert System -->
        <div class="cyber-alert" id="errorMessage">
            <i class="fas fa-exclamation-triangle"></i>
            <span id="errorText">CRITICAL_ERROR: Process aborted.</span>
        </div>

        <!-- Core Input Matrix -->
        <section class="matrix-section">
            <div class="matrix-input-group">
                <label class="matrix-label"><i class="fas fa-terminal"></i> USER_IDENTITY</label>
                <div class="input-wrapper">
                    <input type="text" id="username" class="matrix-input" placeholder="Enter codename..." maxlength="20">
                    <span class="input-glow-bar"></span>
                </div>
            </div>
            
            <div class="matrix-input-group">
                <label class="matrix-label"><i class="fas fa-layer-group"></i> ENVIRONMENT_SECTOR</label>
                <div class="input-wrapper select-container">
                    <select id="lobbySelect" class="matrix-input matrix-select">
                        <option value="0">Initialize Random Sector</option>
                    </select>
                    <span class="input-glow-bar"></span>
                </div>
            </div>
        </section>

        <!-- Command Execution Button -->
        <button class="action-trigger main-trigger" id="generateBtn" disabled>
            <span class="btn-inner">
                <i class="fas fa-bolt-lightning"></i> EXECUTE CORE GENERATION
            </span>
        </button>

        <!-- Dynamic Output Section -->
        <section class="output-container" id="resultSection">
            <div class="canvas-viewport">
                <canvas id="resultCanvas"></canvas>
                <div class="crt-scanline"></div>
                <div class="view-corners"></div>
            </div>
            <div class="control-grid">
                <button class="action-trigger download-trigger" id="downloadBtn">
                    <span class="btn-inner"><i class="fas fa-download"></i> DOWNLOAD ASSET</span>
                </button>
                <button class="action-trigger reset-trigger" id="newBtn">
                    <span class="btn-inner"><i class="fas fa-power-off"></i> REBOOT_SYS</span>
                </button>
            </div>
        </section>

        <!-- Footer -> Created by Wilxd -->
        <footer class="card-footer">
            <div class="architecture-credit">CREATED BY <span class="coder-tag">WILXD</span></div>
        </footer>
    </main>
</div>

<!-- Quantum Loading Overlay -->
<div class="quantum-overlay" id="loadingOverlay">
    <div class="cyber-spinner-matrix">
        <div class="spinner-core"></div>
        <div class="spinner-ring ring-1"></div>
        <div class="spinner-ring ring-2"></div>
    </div>
    <h3 class="loading-headline">COMPILING_METADATA</h3>
    <p class="loading-subtext" id="loadingSub">Connecting to database...</p>
</div>

<!-- Holographic Notification Toast -->
<div class="holo-toast" id="notification">
    <div class="toast-indicator-bar"></div>
    <i class="fas fa-circle-check toast-icon"></i>
    <div class="toast-msg">
        <h5>TRANSMISSION_COMPLETE</h5>
        <p>Asset successfully compiled & signed 🔥</p>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
