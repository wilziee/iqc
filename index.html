<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <!-- Security: Content Security Policy -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' https:; img-src 'self' blob: data: https:; connect-src 'self' https://api.theresav.biz.id;">
    
    <title>IQC STUDIO | Universe Edition</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" integrity="sha512-iecdLmaskl7CVkqkXNQ/ZH/XLlvWZOJyj7Yy7tcenmpD1ypASozpmT/E0iPtmFIB46ZmdtAc9eNBvH0H/ZpiBw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Universe Background Ecosystem -->
    <div class="universe-bg">
        <div class="nebula-layer"></div>
        <div class="stars-layer"></div>
        <div class="meteors-layer">
            <div class="meteor"></div>
            <div class="meteor"></div>
            <div class="meteor"></div>
            <div class="meteor"></div>
        </div>
    </div>

    <main class="container-wrapper">
        <div class="glass-panel">
            <header class="panel-header">
                <div class="header-info">
                    <h1 class="studio-title">IQC STUDIO</h1>
                    <span class="build-version">xaerisoft version</span>
                </div>
                <div class="status-badge secure-badge">
                    <div class="status-pulse"></div>
                    <span>SECURED & READY</span>
                </div>
            </header>
            
            <div class="divider"></div>

            <section class="input-matrix">
                <div class="form-group">
                    <label for="text"><i class="fas fa-comment-dots"></i> PESAN CHAT</label>
                    <input type="text" id="text" class="glow-input" placeholder="Ketik pesan kosmik Anda..." autocomplete="off" spellcheck="false">
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="styleSelect"><i class="fas fa-layer-group"></i> STYLE</label>
                        <div class="select-wrapper">
                            <select id="styleSelect" class="glow-input">
                                <option value="style1">Dark (Style 1)</option>
                                <option value="style2">Pink (Style 2)</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-group" id="bgGroup" style="display:none;">
                        <label for="bgSelect"><i class="fas fa-palette"></i> BACKGROUND</label>
                        <div class="select-wrapper">
                            <select id="bgSelect" class="glow-input">
                                <option value="pink">Supernova (Pink)</option>
                                <option value="light">Starlight (Light)</option>
                                <option value="dark">Void (Dark)</option>
                            </select>
                        </div>
                    </div>
                </div>

                <div class="form-group">
                    <label for="time"><i class="fas fa-clock"></i> WAKTU (HH.MM)</label>
                    <input type="text" id="time" class="glow-input" placeholder="22.54" maxlength="5" autocomplete="off">
                </div>
            </section>

            <div class="alert-box" id="errorMessage">
                <i class="fas fa-exclamation-triangle"></i>
                <span id="errorText">Sistem mendeteksi anomali. Coba lagi.</span>
            </div>

            <button class="btn-universe" id="generateBtn">
                <span class="btn-glow"></span>
                <i class="fas fa-bolt"></i> GENERATE DIMENSION
            </button>

            <section class="result-matrix" id="resultSection">
                <div class="image-frame">
                    <img id="generatedImage" src="" alt="Generated Asset">
                </div>
                <div class="action-grid">
                    <button class="btn-action btn-download" id="downloadBtn">
                        <i class="fas fa-download"></i> Simpan
                    </button>
                    <button class="btn-action btn-reset" id="newBtn">
                        <i class="fas fa-sync-alt"></i> Reset
                    </button>
                </div>
            </section>

            <div class="divider"></div>

            <footer class="panel-footer">
                <a href="#" class="btn-wa" target="_blank" rel="noopener noreferrer">
                    <i class="fab fa-whatsapp"></i> JOIN TRANSMISSION
                </a>
                <p class="credit">ENCRYPTED & DEV BY <span class="highlight">Wilxd</span></p>
            </footer>
        </div>
    </main>

    <!-- Universe Planet Loading -->
    <div class="loading-portal" id="loadingOverlay">
        <div class="planet-loader">
            <div class="orbit"></div>
            <div class="planet"></div>
        </div>
        <p class="loading-text">Rendering Universe...</p>
    </div>

    <!-- Notification Toast -->
    <div class="toast-notification" id="notification">
        <i class="fas fa-check-circle"></i>
        <div class="toast-text">
            <h4>Generate Sukses!</h4>
            <p>Aset telah distabilkan dan siap diunduh.</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
