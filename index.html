<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>XAERISOFT Chat Studio & Generator</title>
    <!-- Modern Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        /* INJEKSI CSS ELEGAN UNTUK INTEGRASI TOOLS & TABS */
        .glass-card { max-width: 650px !important; }
        
        .cyber-tabs {
            display: flex; gap: 10px; overflow-x: auto; padding-bottom: 15px; margin-bottom: 20px;
            scrollbar-width: thin; scrollbar-color: var(--neon-cyan) rgba(0,0,0,0.2);
        }
        .cyber-tabs::-webkit-scrollbar { height: 6px; }
        .cyber-tabs::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); border-radius: 10px; }
        .cyber-tabs::-webkit-scrollbar-thumb { background: var(--neon-cyan); border-radius: 10px; }
        
        .tab-btn {
            background: rgba(0, 0, 0, 0.4); border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-muted); padding: 10px 18px; border-radius: 10px; cursor: pointer;
            white-space: nowrap; transition: all 0.3s ease; font-family: var(--font-display); 
            font-size: 0.85rem; letter-spacing: 1px;
        }
        .tab-btn.active, .tab-btn:hover {
            border-color: var(--neon-cyan); background: rgba(0, 217, 255, 0.1); 
            color: var(--neon-cyan); box-shadow: 0 0 10px rgba(0, 217, 255, 0.2);
        }
        
        .panel { display: none; animation: fadeIn 0.4s ease; }
        .panel.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .upload-preview { display: none; margin-top: 15px; border: 1px solid var(--glass-border); padding: 15px; border-radius: 12px; background: rgba(0,0,0,0.3); text-align: center; }
        .upload-preview.show { display: block !important; }
        .upload-preview img { width: 100%; max-height: 180px; object-fit: contain; border-radius: 8px; margin-bottom: 10px; }
        
        .result-box { display: none; margin-top: 25px; padding-top: 20px; border-top: 1px solid rgba(255,255,255,0.1); text-align: center; }
        .result-box.show { display: block; animation: fadeIn 0.5s ease forwards; }
        .result-img-wrap img { max-width: 100%; border-radius: 12px; border: 1px solid var(--neon-purple); box-shadow: 0 0 15px rgba(108, 99, 255, 0.3); margin-bottom: 15px; }
        .result-actions { display: flex; gap: 10px; justify-content: center; }
        .btn-dl, .btn-copy { padding: 10px 15px; border-radius: 8px; border: none; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 5px; font-family: var(--font-main); transition: 0.3s;}
        .btn-dl { background: var(--neon-cyan); color: #000; }
        .btn-dl:hover { box-shadow: 0 0 15px var(--neon-cyan); }
        .btn-copy { background: transparent; border: 1px solid var(--neon-purple); color: var(--neon-purple); }
        .btn-copy:hover { background: rgba(108, 99, 255, 0.1); }
        
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        @media (max-width: 480px) { .form-row { grid-template-columns: 1fr; gap: 0; } }

        /* Custom Spinner untuk JS */
        .btn-generate.loading { pointer-events: none; opacity: 0.8; }
        .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid #fff; border-top-color: transparent; border-radius: 50%; animation: spin 1s linear infinite; margin-right: 8px; vertical-align: middle; }
        
        /* Toast Logic untuk JS */
        .toast {
            position: fixed; top: 20px; right: 20px; background: rgba(5, 8, 22, 0.9);
            backdrop-filter: blur(10px); border: 1px solid var(--neon-purple);
            padding: 15px 20px; border-radius: 12px; color: var(--text-primary);
            box-shadow: 0 10px 30px rgba(108,99,255,0.3); z-index: 9999;
            transform: translateX(150%); transition: transform 0.4s ease; font-family: var(--font-main); font-size: 0.9rem;
        }
        .toast.show { transform: translateX(0); }
    </style>
</head>
<body>
    <!-- Dynamic Universe Background -->
    <div class="universe-bg">
        <div class="aurora aurora-1"></div>
        <div class="aurora aurora-2"></div>
        <div class="stars"></div>
        <div class="meteors">
            <div class="meteor"></div><div class="meteor"></div><div class="meteor"></div><div class="meteor"></div>
        </div>
        <div class="particles"></div>
    </div>

    <!-- Main Workspace -->
    <div class="container-wrapper">
        <main class="glass-card">
            <header class="studio-header">
                <div class="logo-group">
                    <div class="pulse-ring"></div>
                    <i class="fas fa-microchip cyber-icon"></i>
                    <h1 class="brand-name">XAERISOFT <span>STUDIO</span></h1>
                </div>
                <div class="status-badge">
                    <span class="status-dot"></span> v2.2
                </div>
            </header>

            <!-- TABS MENU -->
            <div class="cyber-tabs" id="toolTabs">
                <button class="tab-btn active" onclick="switchTab('wmp1', this)">WMP 1</button>
                <button class="tab-btn" onclick="switchTab('wmp2', this)">WMP 2</button>
                <button class="tab-btn" onclick="switchTab('fakeff', this)">Fake FF</button>
                <button class="tab-btn" onclick="switchTab('nokia', this)">Nokia</button>
                <button class="tab-btn" onclick="switchTab('ttqc', this)">TTQC</button>
                <button class="tab-btn" onclick="switchTab('iqcimg', this)">IQC Img</button>
                <button class="tab-btn" onclick="switchTab('iqcdark', this)">IQC Dark</button>
                <button class="tab-btn" onclick="switchTab('musiccard', this)">Music Card</button>
            </div>

            <!-- PANEL: WMP 1 -->
            <div id="panel-wmp1" class="panel active">
                <div class="input-grid">
                    <div class="input-wrapper">
                        <label><i class="fas fa-font"></i> Teks (pisahkan baris dengan |)</label>
                        <input type="text" id="wmp1-text" class="neon-input" placeholder="ngapain cemburu|kan|cuman sebatas|teman" value="ngapain cemburu|kan|cuman sebatas|teman">
                    </div>
                    <button class="btn-generate" onclick="generate('wmp1')">
                        <span class="btn-text">GENERATE WMP 1</span> <i class="fas fa-bolt"></i>
                    </button>
                </div>
                <div class="result-box" id="result-wmp1"></div>
                <div class="cyber-alert" id="err-wmp1"></div>
            </div>

            <!-- PANEL: WMP 2 -->
            <div id="panel-wmp2" class="panel">
                <div class="input-grid">
                    <div class="input-wrapper">
                        <label><i class="fas fa-font"></i> Teks (pisahkan baris dengan |)</label>
                        <input type="text" id="wmp2-text" class="neon-input" placeholder="ngapain cemburu|kan|cuman sebatas|teman" value="ngapain cemburu|kan|cuman sebatas|teman">
                    </div>
                    <button class="btn-generate" onclick="generate('wmp2')">
                        <span class="btn-text">GENERATE WMP 2</span> <i class="fas fa-bolt"></i>
                    </button>
                </div>
                <div class="result-box" id="result-wmp2"></div>
                <div class="cyber-alert" id="err-wmp2"></div>
            </div>

            <!-- PANEL: FAKE FF -->
            <div id="panel-fakeff" class="panel">
                <div class="input-grid">
                    <div class="input-wrapper">
                        <label><i class="fas fa-gamepad"></i> Username</label>
                        <input type="text" id="fakeff-usn" class="neon-input" placeholder="" value="">
                    </div>
                    <button class="btn-generate" onclick="generate('fakeff')">
                        <span class="btn-text">GENERATE FAKE FF</span> <i class="fas fa-bolt"></i>
                    </button>
                </div>
                <div class="result-box" id="result-fakeff"></div>
                <div class="cyber-alert" id="err-fakeff"></div>
            </div>

            <!-- PANEL: NOKIA -->
            <div id="panel-nokia" class="panel">
                <div class="input-grid">
                    <div class="input-wrapper">
                        <label><i class="fas fa-envelope"></i> Isi Pesan</label>
                        <input type="text" id="nokia-text" class="neon-input" placeholder="kata-kata hari ini" value="kata-kata hari ini">
                    </div>
                    <div class="form-row">
                        <div class="input-wrapper">
                            <label><i class="fas fa-user"></i> Pengirim</label>
                            <input type="text" id="nokia-from" class="neon-input" placeholder="" value="">
                        </div>
                        <div class="input-wrapper">
                            <label><i class="fas fa-heading"></i> Title</label>
                            <input type="text" id="nokia-title" class="neon-input" placeholder="" value="">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="input-wrapper">
                            <label><i class="fas fa-calendar-alt"></i> Tanggal</label>
                            <input type="text" id="nokia-date" class="neon-input" placeholder="08/06/2026" value="08/06/2026">
                        </div>
                        <div class="input-wrapper">
                            <label><i class="fas fa-clock"></i> Waktu</label>
                            <input type="text" id="nokia-time" class="neon-input" placeholder="12:00" value="12:00">
                        </div>
                    </div>
                    <button class="btn-generate" onclick="generate('nokia')">
                        <span class="btn-text">GENERATE NOKIA</span> <i class="fas fa-bolt"></i>
                    </button>
                </div>
                <div class="result-box" id="result-nokia"></div>
                <div class="cyber-alert" id="err-nokia"></div>
            </div>

            <!-- PANEL: TTQC -->
            <div id="panel-ttqc" class="panel">
                <div class="input-grid">
                    <div class="input-wrapper">
                        <label><i class="fas fa-image"></i> Upload Foto Profile</label>
                        <div class="drop-zone" id="drop-ttqc" onclick="document.getElementById('file-ttqc').click()" ondragover="onDragOver(event,'ttqc')" ondragleave="onDragLeave(event,'ttqc')" ondrop="onDrop(event,'ttqc')">
                            <input type="file" id="file-ttqc" accept="image/*" hidden onchange="handleFile('ttqc')">
                            <div class="dz-content"><i class="fas fa-cloud-upload-alt upload-icon"></i><span class="dz-text">Pilih Gambar</span><span class="dz-subtext">Drop or click</span></div>
                        </div>
                        <div class="upload-preview" id="preview-ttqc">
                            <img id="preview-img-ttqc" src="" alt="preview">
                            <div id="preview-fname-ttqc" style="font-size:0.8rem; color:var(--neon-cyan); font-weight:bold;"></div>
                            <div id="preview-url-ttqc" style="font-size:0.7rem; color:var(--text-muted); margin-bottom:10px;"></div>
                            <button class="btn-cyber btn-reset" onclick="removeUpload('ttqc')" style="width:100%;"><i class="fas fa-trash"></i> Hapus</button>
                        </div>
                    </div>
                    <div class="input-wrapper">
                        <label><i class="fas fa-user-tag"></i> Nama</label>
                        <input type="text" id="ttqc-name" class="neon-input" placeholder="NexaDev" value="NexaDev">
                    </div>
                    <div class="input-wrapper">
                        <label><i class="fas fa-quote-left"></i> Teks Quote</label>
                        <input type="text" id="ttqc-text" class="neon-input" placeholder="Tulis quote kamu..." value="Tulis quote kamu...">
                    </div>
                    <button class="btn-generate" onclick="generate('ttqc')">
                        <span class="btn-text">GENERATE TTQC</span> <i class="fas fa-bolt"></i>
                    </button>
                </div>
                <div class="result-box" id="result-ttqc"></div>
                <div class="cyber-alert" id="err-ttqc"></div>
            </div>

            <!-- PANEL: IQC IMG -->
            <div id="panel-iqcimg" class="panel">
                <div class="input-grid">
                    <div class="input-wrapper">
                        <label><i class="fas fa-image"></i> Upload Foto Profile</label>
                        <div class="drop-zone" id="drop-iqcimg" onclick="document.getElementById('file-iqcimg').click()" ondragover="onDragOver(event,'iqcimg')" ondragleave="onDragLeave(event,'iqcimg')" ondrop="onDrop(event,'iqcimg')">
                            <input type="file" id="file-iqcimg" accept="image/*" hidden onchange="handleFile('iqcimg')">
                            <div class="dz-content"><i class="fas fa-cloud-upload-alt upload-icon"></i><span class="dz-text">Pilih Gambar</span><span class="dz-subtext">Drop or click</span></div>
                        </div>
                        <div class="upload-preview" id="preview-iqcimg">
                            <img id="preview-img-iqcimg" src="" alt="preview">
                            <div id="preview-fname-iqcimg" style="font-size:0.8rem; color:var(--neon-cyan); font-weight:bold;"></div>
                            <div id="preview-url-iqcimg" style="font-size:0.7rem; color:var(--text-muted); margin-bottom:10px;"></div>
                            <button class="btn-cyber btn-reset" onclick="removeUpload('iqcimg')" style="width:100%;"><i class="fas fa-trash"></i> Hapus</button>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="input-wrapper">
                            <label><i class="fas fa-comment-alt"></i> Teks</label>
                            <input type="text" id="iqcimg-text" class="neon-input" placeholder="aku lucu gak?" value="aku lucu gak?">
                        </div>
                        <div class="input-wrapper">
                            <label><i class="fas fa-clock"></i> Waktu</label>
                            <input type="text" id="iqcimg-time" class="neon-input" placeholder="01.27" value="01.27">
                        </div>
                    </div>
                    <button class="btn-generate" onclick="generate('iqcimg')">
                        <span class="btn-text">GENERATE IQC IMG</span> <i class="fas fa-bolt"></i>
                    </button>
                </div>
                <div class="result-box" id="result-iqcimg"></div>
                <div class="cyber-alert" id="err-iqcimg"></div>
            </div>

            <!-- PANEL: IQC DARK -->
            <div id="panel-iqcdark" class="panel">
                <div class="input-grid">
                    <div class="input-wrapper">
                        <label><i class="fas fa-comment-dots"></i> Teks</label>
                        <input type="text" id="iqcdark-text" class="neon-input" placeholder="aku lucu gak?" value="aku lucu gak?">
                    </div>
                    <div class="input-wrapper">
                        <label><i class="fas fa-clock"></i> Waktu</label>
                        <input type="text" id="iqcdark-time" class="neon-input" placeholder="01.27" value="01.27">
                    </div>
                    <button class="btn-generate" onclick="generate('iqcdark')">
                        <span class="btn-text">GENERATE IQC DARK</span> <i class="fas fa-bolt"></i>
                    </button>
                </div>
                <div class="result-box" id="result-iqcdark"></div>
                <div class="cyber-alert" id="err-iqcdark"></div>
            </div>
            
            <!-- PANEL: MUSIC CARD -->
            <div id="panel-musiccard" class="panel">
                <div class="input-grid">
                    <div class="form-row">
                        <div class="input-wrapper">
                            <label><i class="fas fa-music"></i> Judul Lagu</label>
                            <input type="text" id="musiccard-judul" class="neon-input" placeholder="Gwgwu" value="Gwgwu">
                        </div>
                        <div class="input-wrapper">
                            <label><i class="fas fa-microphone"></i> Nama Artis</label>
                            <input type="text" id="musiccard-nama" class="neon-input" placeholder="Jvwhev" value="Jvwhev">
                        </div>
                    </div>
                    <div class="input-wrapper">
                        <label><i class="fas fa-compact-disc"></i> Upload Cover Image</label>
                        <div class="drop-zone" id="drop-musiccard" onclick="document.getElementById('file-musiccard').click()" ondragover="onDragOver(event,'musiccard')" ondragleave="onDragLeave(event,'musiccard')" ondrop="onDrop(event,'musiccard')">
                            <input type="file" id="file-musiccard" accept="image/*" hidden onchange="handleFile('musiccard')">
                            <div class="dz-content"><i class="fas fa-cloud-upload-alt upload-icon"></i><span class="dz-text">Pilih Cover</span><span class="dz-subtext">Drop or click</span></div>
                        </div>
                        <div class="upload-preview" id="preview-musiccard">
                            <img id="preview-img-musiccard" src="" alt="preview">
                            <div id="preview-fname-musiccard" style="font-size:0.8rem; color:var(--neon-cyan); font-weight:bold;"></div>
                            <div id="preview-url-musiccard" style="font-size:0.7rem; color:var(--text-muted); margin-bottom:10px;"></div>
                            <button class="btn-cyber btn-reset" onclick="removeUpload('musiccard')" style="width:100%;"><i class="fas fa-trash"></i> Hapus</button>
                        </div>
                    </div>
                    <button class="btn-generate" onclick="generate('musiccard')">
                        <span class="btn-text">GENERATE MUSIC CARD</span> <i class="fas fa-bolt"></i>
                    </button>
                </div>
                <div class="result-box" id="result-musiccard"></div>
                <div class="cyber-alert" id="err-musiccard"></div>
            </div>

            <footer class="cyber-footer">
                <p>ENGINEERED BY <span>XAERISOFT</span></p>
            </footer>
        </main>
    </div>

    <!-- Cyber Notification / Toast -->
    <div class="toast" id="toast"></div>

    <script src="script.js"></script>
</body>
</html>
